services:
  postgres-service:
    image: postgres:16-alpine
    container_name: guitarshop-postgres
    env_file:
      - .env
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - guitarshop-network

  backend-service:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: guitarshop-backend
    env_file:
      - .env
    environment:
      DB_HOST: postgres-service
      DB_PORT: 5432
      DB_USER: ${POSTGRES_USER}
      DB_PASSWORD: ${POSTGRES_PASSWORD}
      DB_NAME: ${POSTGRES_DB}
      DB_SSLMODE: disable
      SERVER_PORT: 8000
      GIN_MODE: ${GIN_MODE:-release}
      GENERATE_TEST_DATA: ${GENERATE_TEST_DATA:-false}
    depends_on:
      postgres-service:
        condition: service_healthy
    networks:
      - guitarshop-network

  nginx-service:
    build:
      context: ./nginx
      dockerfile: Dockerfile
    container_name: guitarshop-nginx
    ports:
      - "80:80"
    depends_on:
      - backend-service
    networks:
      - guitarshop-network

volumes:
  postgres-data:

networks:
  guitarshop-network:
    driver: bridge
